#cloud-config
autoinstall:
  version: 1

  user-data:
    users: [""]
    disable_root: false

  ssh:
    install-server: no

  storage:
    layout:
      name: lvm
      password: ubuntu   # Need to be equal with the Script, need to be changed from the User

  keyboard:
    layout: de
  locale: en_US
  timezone: Europe/Berlin
  updates: security
  shutdown: reboot

  # Mandatory Packages for installing the Intune Requierments
  packages:
    - curl
    - git
    - wget
    - gpg

  # snaps: # (Optional) Install additional apps from this catalog: https://snapcraft.io/store
  #   - name: code
  #     classic: true
  #   - name: postman
  #   - name: powershell
  #     classic: true
  #   - name: sublime-text
  #     classic: true

  late-commands:

    # ── Microsoft Intune Portal ───────────────────────────────────────────────
    - curtin in-target --target=/target -- mkdir -p /tmp/microsoft
    - curtin in-target --target=/target -- sh -c 'curl https://packages.microsoft.com/keys/microsoft.asc | gpg --dearmor > /tmp/microsoft/microsoft.gpg'
    - curtin in-target --target=/target -- install -o root -g root -m 644 /tmp/microsoft/microsoft.gpg /usr/share/keyrings/microsoft.gpg
    - curtin in-target --target=/target -- sh -c 'echo "deb [arch=amd64 signed-by=/usr/share/keyrings/microsoft.gpg] https://packages.microsoft.com/ubuntu/24.04/prod noble main" > /etc/apt/sources.list.d/microsoft-ubuntu-noble-prod.list'
    - curtin in-target --target=/target -- apt-get update
    - curtin in-target --target=/target -- apt-get install -y intune-portal

    # ── Microsoft Edge ────────────────────────────────────────────────────────
    - curtin in-target --target=/target -- sh -c 'curl https://packages.microsoft.com/keys/microsoft.asc | gpg --dearmor > /tmp/microsoft/microsoft.gpg'
    - curtin in-target --target=/target -- install -o root -g root -m 644 /tmp/microsoft/microsoft.gpg /usr/share/keyrings/microsoft.gpg
    - curtin in-target --target=/target -- sh -c 'echo "deb [arch=amd64 signed-by=/usr/share/keyrings/microsoft.gpg] https://packages.microsoft.com/repos/edge stable main" > /etc/apt/sources.list.d/microsoft-edge-dev.list'
    - curtin in-target --target=/target -- apt-get update
    - curtin in-target --target=/target -- apt-get install -y microsoft-edge-stable

    

    # ── Remove bloatware (optional) ───────────────────────────────────────────
    # - curtin in-target --target=/target -- apt-get purge -y libreoffice* remmina* transmission*
    # - curtin in-target --target=/target -- apt-get autoremove -y
    # - curtin in-target --target=/target -- apt-get clean
